services:
  sdk:
    build:
      dockerfile: .container/Containerfile
      target: devcontainer
      context: ../..
    user: "1000"
    command: sleep infinity
    tty: true
    stdin_open: true
    volumes:
      - ../..:/workspace:cached
      - bun-cache:/tmp/bun-cache:z
      - git-config:/home/happy/.config/git:z
      - vscode-server:/home/happy/.vscode-server:z
      - jetbrains-cache:/home/happy/.cache/JetBrains:z
      - jetbrains-config:/home/happy/.config/JetBrains:z
      - shell-history:/container/shell-history

volumes:
  bun-cache:
    driver: local
  git-config:
    driver: local
  vscode-server:
    driver: local
  jetbrains-cache:
    driver: local
  jetbrains-config:
    driver: local
  shell-history:
    driver: local

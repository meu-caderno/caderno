name: "Flow - Build"

on:
  workflow_run:
    workflows: 
      - "Flow - Quality"
    types:
      - completed

jobs:
  build:
    name: "Build container image"
    
    runs-on: ubuntu-latest

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: "Checkout do código-fonte"
        uses: actions/checkout@v7.0.0

      - name: "Set up QEMU"
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: "Autenticação no GitHub Container Registry"
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_TOKEN }}

      - name: "Construção e publicação da imagem de contêiner"
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: .container/Containerfile
          target: runtime
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_BASENAME }}/${{ env.IMAGE_SERVICE }}:development
          build-args: |
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT_HASH=${{ github.sha }}
            BUILD_DEBUG=*

          push: false

          cache-from: |
            type=gha,scope=${{ env.IMAGE_SERVICE }}-dev
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_BASENAME }}/${{ env.IMAGE_SERVICE }}:cache-development
          cache-to: |
            type=gha,scope=${{ env.IMAGE_SERVICE }}-dev,mode=max
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_BASENAME }}/${{ env.IMAGE_SERVICE }}:cache-development,mode=max

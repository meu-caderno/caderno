name: "Quality"

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  job:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: "Checkout do código-fonte"
        uses: actions/checkout@v7.0.0

      - name: "Check for format and lint issues"
        uses: ./.github/actions/run-in-devcontainer
        with:
          imageName: ${{ env.REGISTRY }}/${{ env.IMAGE_BASENAME }}/${{ env.IMAGE_SERVICE }}
          command: |
            bun install;
            bun run check:ci;

      - name: "Build PWA in DevContainer"
        uses: ./.github/actions/run-in-devcontainer
        with:
          imageName: ${{ env.REGISTRY }}/${{ env.IMAGE_BASENAME }}/${{ env.IMAGE_SERVICE }}
          command: |
            cd src/pkgs/apps/pwa;
            bun install;
            bun run build;

name: "Flow - Quality"

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest

    timeout-minutes: 15

    permissions:
      contents: read

    steps:
      - name: "Checkout source-code"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: "Prepare source-code with SDK"
        uses: ./.github/actions/prepare

      - name: "Quality Check: Lint + format + typecheck"
        uses: ./.github/actions/run-in-devcontainer
        with:
          command: |
            cd src;
            bun run quality:check:ci;

      - name: "Quality Check: everything must build"
        uses: ./.github/actions/run-in-devcontainer
        with:
          command: |
            cd src;
            bun run all:build;

      - name: "All files must be properly covered by license"
        uses: ./.github/actions/run-in-devcontainer
        with:
          command: |
            reuse lint;

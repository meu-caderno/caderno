name: "Flow - Deploy"

on:
  push:
    branches:
      - main

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build:
    name: "Build"

    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      attestations: write
      artifact-metadata: write  
      id-token: write

    steps:
      - name: "Checkout source-code"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: "Prepare source-code with SDK"
        uses: ./.github/actions/prepare

      - name: "Build PWA in DevContainer"
        uses: ./.github/actions/run-in-devcontainer
        with:
          command: |
            cd src/pkgs/apps/pwa;
            bun run generate;

      - uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763
        with:
          subject-path: src/pkgs/apps/pwa/.output/public

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: src/pkgs/apps/pwa/.output/public

  deploy:
    needs: build

    runs-on: ubuntu-latest
    timeout-minutes: 10

    environment:
      name: deploy-production
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128

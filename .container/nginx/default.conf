server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compressão dos assets de texto
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        application/manifest+json;

    # SPA/PWA: roteamento client-side (history mode) cai no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets versionados (hash no nome) — cache longo e imutável
    location /_nuxt/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Service worker e manifest não podem ser cacheados (atualização do PWA)
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
    }

    # index.html nunca cacheado, para sempre apontar para o build mais recente
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
